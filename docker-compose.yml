services:
  wtm-lebowski:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: wtm-lebowski
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      # ET_BASE_CURRENCY: "AED"
      # Set to "1" once a reverse proxy is terminating HTTPS in front of this.
      ET_COOKIE_SECURE: "0"
    restart: unless-stopped
